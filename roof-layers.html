<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Before/After Slider Example</title>

<!-- Stylesheets -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/beerslider/dist/BeerSlider.css">

<style>
body {
    font-family: Arial, sans-serif;
    padding: 50px;
    background: #f5f5f5;
    margin: 0;
}

.beer-slider-wrapper {
    position: relative;
    max-width: 600px;
    margin: auto;
}

/* Buttons at bottom-left and bottom-right of the image */
.before-after-buttons {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 10px;
    z-index: 10;
}

.before-after-buttons button {
    padding: 10px 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    font-weight: bold;
    transition: 0.3s;
}

.before-after-buttons button:hover {
    background: rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<h2 style="text-align:center; margin-bottom:30px;">Before / After Slider</h2>

<div class="beer-slider-wrapper">
  <div class="beer-slider" data-beer-label="">
    <!-- AFTER IMAGE -->
    <img src="images/gallery/21.jpg" alt="After Image">

    <!-- BEFORE IMAGE -->
    <div class="beer-reveal" data-beer-label="">
      <img src="images/gallery/before.jpg" alt="Before Image">
    </div>
  </div>

  <!-- Buttons at bottom-left and bottom-right -->
  <div class="before-after-buttons">
    <button class="btn-before">Before</button>
    <button class="btn-after">After</button>
  </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/beerslider/dist/BeerSlider.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const sliderWrapper = document.querySelector('.beer-slider-wrapper');
  const slider = sliderWrapper.querySelector('.beer-slider');
  const beer = new BeerSlider(slider);

  const btnBefore = sliderWrapper.querySelector('.btn-before');
  const btnAfter = sliderWrapper.querySelector('.btn-after');

  const reveal = slider.querySelector('.beer-reveal');

  // Smooth animation function
  function animateReveal(targetWidth) {
    let start = parseFloat(reveal.style.width) || 0;
    let end = targetWidth;
    let step = (end - start) / 20; // 20 frames
    let i = 0;
    const anim = setInterval(() => {
      if(i >= 20) {
        clearInterval(anim);
        reveal.style.width = end + "%";
        return;
      }
      start += step;
      reveal.style.width = start + "%";
      i++;
    }, 15); // 15ms per frame
  }

  btnBefore.addEventListener('click', () => {
    animateReveal(100); // show full before
  });

  btnAfter.addEventListener('click', () => {
    animateReveal(0);   // show full after
  });

});
</script>

</body>
</html>
